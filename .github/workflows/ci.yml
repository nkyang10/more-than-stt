name: CI Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CantoneseDictation.csproj

      - name: Build
        run: |
          dotnet publish CantoneseDictation.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CantoneseDictation-build
          path: dist/
          retention-days: 7

  package:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: CantoneseDictation-build
          path: dist/

      - name: Package release
        run: |
          cd dist
          zip -r ../CantoneseDictation_v${{ github.ref_name }}.zip ./*
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: CantoneseDictation_v${{ github.ref_name }}.zip
          generate_release_notes: true
